---
name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Install Docker Sandbox
        run: |
          sudo cp .github/apt/docker.asc /etc/apt/keyrings/
          sudo cp .github/apt/docker.sources /etc/apt/sources.list.d/
          sudo apt install --update --yes --no-install-recommends docker-sbx

      - name: Validate sandbox kit
        run: sbx kit validate .sandbox/base

      - name: GHCR login
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push sandbox kit
        run: sbx kit push .sandbox/base ghcr.io/${{ github.repository }}:kit

      - name: Build and push image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .sandbox/base
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          tags: ghcr.io/${{ github.repository }}:base
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
